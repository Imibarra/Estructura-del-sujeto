<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto del Sujeto</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --dropzone-bg: rgba(30, 41, 59, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Pantalla Inicial */
        #start-screen {
            text-align: center;
            z-index: 10;
        }

        .welcome-card {
            background: var(--card);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Contenedor Principal */
        #game-container {
            display: none;
            width: 95%;
            max-width: 1000px;
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            position: relative;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Área de Oración (Origen) */
        #words-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 1rem;
            margin-bottom: 2rem;
            min-height: 80px;
        }

        .draggable-word {
            background: #334155;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: grab;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, opacity 0.2s;
        }

        .draggable-word:active { cursor: grabbing; }
        .dragging { opacity: 0.5; transform: scale(0.9); }

        /* Zonas de Soltar */
        .drop-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        .drop-box {
            background: var(--dropzone-bg);
            border: 2px dashed #475569;
            border-radius: 1rem;
            padding: 15px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s;
        }

        .drop-box.over {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        .drop-box h4 {
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .drop-box-content {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Botones */
        .main-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }

        /* Modales */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            max-width: 500px;
        }

        #progress {
            position: absolute;
            top: 0; left: 0; height: 6px;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="start-screen">
        <div class="welcome-card">
            <h1 style="margin-bottom: 1rem; font-size: 2.5rem;">Reto del Sujeto</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Arrastra las palabras a su categoría correspondiente para analizar el sujeto.</p>
            <button class="main-btn" onclick="startGame()">INICIAR RETO</button>
        </div>
    </div>

    <!-- Juego -->
    <div id="game-container">
        <div id="progress"></div>
        <div class="hud">
            <div>PUNTOS: <span id="score">0</span> / 50</div>
            <div>TIEMPO: <span id="timer">00:00</span></div>
        </div>

        <h3 style="text-align: center; margin-bottom: 1rem;">Analiza la estructura del sujeto:</h3>
        
        <div id="words-pool">
            <!-- Las palabras de la oración aparecerán aquí -->
        </div>

        <div class="drop-section">
            <div class="drop-box" data-type="det">
                <h4>Determinante</h4>
                <div class="drop-box-content"></div>
            </div>
            <div class="drop-box" data-type="nuc">
                <h4>Núcleo</h4>
                <div class="drop-box-content"></div>
            </div>
            <div class="drop-box" data-type="com">
                <h4>Complemento</h4>
                <div class="drop-box-content"></div>
            </div>
        </div>

        <div style="display: flex; justify-content: center;">
            <button class="main-btn" id="check-btn">REVISAR ANÁLISIS</button>
        </div>
    </div>

    <!-- Modales -->
    <div class="modal" id="error-modal">
        <div class="modal-content">
            <h2 style="color: var(--error); margin-bottom: 1rem;">¡ERROR ESTRUCTURAL!</h2>
            <p id="error-msg" style="margin-bottom: 2rem; color: var(--text-dim);"></p>
            <button class="main-btn" onclick="location.reload()">REINTENTAR DESDE CERO</button>
        </div>
    </div>

    <div class="modal" id="win-modal">
        <div class="modal-content">
            <h2 style="color: var(--success); margin-bottom: 1rem;">¡OBJETIVO LOGRADO!</h2>
            <p>Has completado las 50 oraciones con éxito.</p>
            <button class="main-btn" onclick="location.reload()">NUEVA PARTIDA</button>
        </div>
    </div>

    <script>
        const database = [
            { t: "El gran perro ladra por la noche", det: ["El"], nuc: ["perro"], com: ["gran"] },
            { t: "Llegaron tarde los invitados", det: ["los"], nuc: ["invitados"], com: [] },
            { t: "Mi hermana estudia medicina", det: ["Mi"], nuc: ["hermana"], com: [] },
            { t: "En el jardín juegan los niños", det: ["los"], nuc: ["niños"], com: [] },
            { t: "Cantan los pájaros al amanecer", det: ["los"], nuc: ["pájaros"], com: [] },
            { t: "Un coche rojo bloquea la entrada", det: ["Un"], nuc: ["coche"], com: ["rojo"] },
            { t: "Corren por el parque los atletas", det: ["los"], nuc: ["atletas"], com: [] },
            { t: "La lluvia cae sin parar", det: ["La"], nuc: ["lluvia"], com: [] },
            { t: "Baila en el escenario la artista", det: ["la"], nuc: ["artista"], com: [] },
            { t: "Algunos estudiantes leen en silencio", det: ["Algunos"], nuc: ["estudiantes"], com: [] },
            { t: "En la mesa está el libro", det: ["el"], nuc: ["libro"], com: [] },
            { t: "Un grupo de turistas visita el museo", det: ["Un"], nuc: ["grupo"], com: ["de", "turistas"] },
            { t: "Apareció de repente el gato", det: ["el"], nuc: ["gato"], com: [] },
            { t: "Los profesores explican la lección", det: ["Los"], nuc: ["profesores"], com: [] },
            { t: "En la cocina cocina mi madre", det: ["mi"], nuc: ["madre"], com: [] },
            { t: "Varias flores adornan el balcón", det: ["Varias"], nuc: ["flores"], com: [] },
            { t: "Se rompió el vaso de cristal", det: ["el"], nuc: ["vaso"], com: ["de", "cristal"] },
            { t: "El viento sopla fuerte hoy", det: ["El"], nuc: ["viento"], com: [] },
            { t: "En el cielo brillan las estrellas", det: ["las"], nuc: ["estrellas"], com: [] },
            { t: "Un niño pequeño llora en la calle", det: ["Un"], nuc: ["niño"], com: ["pequeño"] },
            { t: "Llegó temprano el tren", det: ["el"], nuc: ["tren"], com: [] },
            { t: "La música suena muy alta", det: ["La"], nuc: ["música"], com: [] },
            { t: "En el estadio gritan los aficionados", det: ["los"], nuc: ["aficionados"], com: [] },
            { t: "Algunos libros interesantes están en la estantería", det: ["Algunos"], nuc: ["libros"], com: ["interesantes"] },
            { t: "El sol ilumina la ciudad", det: ["El"], nuc: ["sol"], com: [] },
            { t: "Caminan despacio los ancianos", det: ["los"], nuc: ["ancianos"], com: [] },
            { t: "Un profesor de historia explica el tema", det: ["Un"], nuc: ["profesor"], com: ["de", "historia"] },
            { t: "En el río nadan los peces", det: ["los"], nuc: ["peces"], com: [] },
            { t: "La puerta está abierta", det: ["La"], nuc: ["puerta"], com: [] },
            { t: "Hablan en voz baja los estudiantes", det: ["los"], nuc: ["estudiantes"], com: [] },
            { t: "Un perro sin dueño vaga por la calle", det: ["Un"], nuc: ["perro"], com: ["sin", "dueño"] },
            { t: "En el bosque crecen los árboles", det: ["los"], nuc: ["árboles"], com: [] },
            { t: "La niña canta una canción", det: ["La"], nuc: ["niña"], com: [] },
            { t: "Llegaron cansados los viajeros", det: ["los"], nuc: ["viajeros"], com: [] },
            { t: "Un equipo de fútbol entrena en el campo", det: ["Un"], nuc: ["equipo"], com: ["de", "fútbol"] },
            { t: "En la playa descansan los turistas", det: ["los"], nuc: ["turistas"], com: [] },
            { t: "El reloj marca la hora", det: ["El"], nuc: ["reloj"], com: [] },
            { t: "Observan atentos los científicos", det: ["los"], nuc: ["científicos"], com: [] },
            { t: "Un grupo de amigos sale esta noche", det: ["Un"], nuc: ["grupo"], com: ["de", "amigos"] },
            { t: "En la sala esperan los pacientes", det: ["los"], nuc: ["pacientes"], com: [] },
            { t: "La película termina tarde", det: ["La"], nuc: ["película"], com: [] },
            { t: "Corren sin parar los caballos", det: ["los"], nuc: ["caballos"], com: [] },
            { t: "Un artista famoso pinta el cuadro", det: ["Un"], nuc: ["artista"], com: ["famoso"] },
            { t: "En la escuela estudian los alumnos", det: ["los"], nuc: ["alumnos"], com: [] },
            { t: "El agua hierve en la olla", det: ["El"], nuc: ["agua"], com: [] },
            { t: "Escuchan música los jóvenes", det: ["los"], nuc: ["jóvenes"], com: [] },
            { t: "Un vecino ruidoso molesta a todos", det: ["Un"], nuc: ["vecino"], com: ["ruidoso"] },
            { t: "En el cielo vuelan los aviones", det: ["los"], nuc: ["aviones"], com: [] },
            { t: "La computadora funciona bien", det: ["La"], nuc: ["computadora"], com: [] },
            { t: "Trabajan juntos los buenos compañeros", det: ["los"], nuc: ["compañeros"], com: ["buenos"] },
            { t: "Un hombre alto entra en la tienda", det: ["Un"], nuc: ["hombre"], com: ["alto"] },
            { t: "En el teatro actúan los actores", det: ["los"], nuc: ["actores"], com: [] },
            { t: "La luz ilumina el cuarto", det: ["La"], nuc: ["luz"], com: [] },
            { t: "Habla con claridad la profesora", det: ["la"], nuc: ["profesora"], com: [] },
            { t: "Un grupo de niños juega en el patio", det: ["Un"], nuc: ["grupo"], com: ["de", "niños"] },
            { t: "En el campo pastan las vacas", det: ["las"], nuc: ["vacas"], com: [] },
            { t: "El tren sale puntual", det: ["El"], nuc: ["tren"], com: [] },
            { t: "Miran atentos los espectadores", det: ["los"], nuc: ["espectadores"], com: [] },
            { t: "Un estudiante aplicado hace la tarea", det: ["Un"], nuc: ["estudiante"], com: ["aplicado"] },
            { t: "En la biblioteca leen los usuarios", det: ["los"], nuc: ["usuarios"], com: [] },
            { t: "La puerta se cierra sola", det: ["La"], nuc: ["puerta"], com: [] },
            { t: "Corren rápido los corredores", det: ["los"], nuc: ["corredores"], com: [] },
            { t: "Un gato negro duerme en el sofá", det: ["Un"], nuc: ["gato"], com: ["negro"] },
            { t: "En la calle venden frutas los comerciantes", det: ["los"], nuc: ["comerciantes"], com: [] },
            { t: "El profesor corrige exámenes", det: ["El"], nuc: ["profesor"], com: [] },
            { t: "Escuchan atentos los estudiosos alumnos", det: ["los"], nuc: ["alumnos"], com: ["estudiosos"] },
            { t: "Un grupo de músicos toca en vivo", det: ["Un"], nuc: ["grupo"], com: ["de", "músicos"] },
            { t: "En el parque pasean los perros", det: ["los"], nuc: ["perros"], com: [] },
            { t: "La lluvia moja el suelo frio", det: ["La"], nuc: ["lluvia"], com: ["frio"] },
            { t: "Llegan tarde los empleados", det: ["los"], nuc: ["empleados"], com: [] },
            { t: "Un coche viejo circula despacio", det: ["Un"], nuc: ["coche"], com: ["viejo"] },
            { t: "En la montaña viven los pastores", det: ["los"], nuc: ["pastores"], com: [] },
            { t: "El niño juega con su pelota", det: ["El"], nuc: ["niño"], com: [] },
            { t: "Cantan felices los niños del coro", det: ["los"], nuc: ["niños"], com: ["del", "coro"] },
            { t: "Un hombre de traje espera el autobús", det: ["Un"], nuc: ["hombre"], com: ["de", "traje"] }
        ];

        let score = 0;
        let timerInterval;
        let currentSentence;
        let startTime;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            startTime = Date.now();
            initTimer();
            loadNewSentence();
        }

        function initTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function loadNewSentence() {
            const pool = document.getElementById('words-pool');
            const contents = document.querySelectorAll('.drop-box-content');
            pool.innerHTML = '';
            contents.forEach(c => c.innerHTML = '');

            currentSentence = database[Math.floor(Math.random() * database.length)];
            const words = currentSentence.t.split(' ');

            words.forEach((word, index) => {
                const el = document.createElement('div');
                el.className = 'draggable-word';
                el.innerText = word;
                el.draggable = true;
                el.id = `word-${index}`;
                el.addEventListener('dragstart', dragStart);
                el.addEventListener('dragend', dragEnd);
                pool.appendChild(el);
            });

            const dropBoxes = document.querySelectorAll('.drop-box');
            dropBoxes.forEach(box => {
                box.addEventListener('dragover', dragOver);
                box.addEventListener('dragleave', dragLeave);
                box.addEventListener('drop', dropWord);
            });
            pool.addEventListener('dragover', dragOver);
            pool.addEventListener('drop', dropWord);
        }

        let draggedItem = null;

        function dragStart(e) {
            draggedItem = this;
            setTimeout(() => this.classList.add('dragging'), 0);
        }

        function dragEnd() {
            this.classList.remove('dragging');
            draggedItem = null;
        }

        function dragOver(e) {
            e.preventDefault();
            this.classList.add('over');
        }

        function dragLeave() {
            this.classList.remove('over');
        }

        function dropWord(e) {
            e.preventDefault();
            this.classList.remove('over');
            
            if (this.classList.contains('drop-box')) {
                this.querySelector('.drop-box-content').appendChild(draggedItem);
            } else {
                this.appendChild(draggedItem);
            }
        }

        document.getElementById('check-btn').onclick = () => {
            const getWordsIn = (type) => {
                return Array.from(document.querySelector(`.drop-box[data-type="${type}"] .drop-box-content`)
                            .querySelectorAll('.draggable-word'))
                            .map(el => el.innerText.toLowerCase().replace(/[.,]/g, ""));
            };

            const userDet = getWordsIn('det');
            const userNuc = getWordsIn('nuc');
            const userCom = getWordsIn('com');

            const correctDet = currentSentence.det.map(w => w.toLowerCase());
            const correctNuc = currentSentence.nuc.map(w => w.toLowerCase());
            const correctCom = currentSentence.com.map(w => w.toLowerCase());

            const isCorrect = 
                arraysEqual(userDet, correctDet) && 
                arraysEqual(userNuc, correctNuc) && 
                arraysEqual(userCom, correctCom);

            if (isCorrect) {
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('progress').style.width = `${(score/50)*100}%`;
                
                if (score >= 50) {
                    clearInterval(timerInterval);
                    document.getElementById('win-modal').style.display = 'flex';
                } else {
                    loadNewSentence();
                }
            } else {
                clearInterval(timerInterval);
                const sol = `La solución era:\nDet: ${correctDet.join(', ') || '-'}\nNúcleo: ${correctNuc.join(', ')}\nComp: ${correctCom.join(', ') || '-'}`;
                document.getElementById('error-msg').innerText = sol;
                document.getElementById('error-modal').style.display = 'flex';
            }
        };

        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            const sortedA = [...a].sort();
            const sortedB = [...b].sort();
            return sortedA.every((val, index) => val === sortedB[index]);
        }
    </script>
</body>
</html>
